server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # ─── Security Headers ───
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://us-assets.i.posthog.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.googletagmanager.com; connect-src 'self' https://oos-api.onrender.com https://us.i.posthog.com https://www.google-analytics.com https://analytics.google.com https://*.google-analytics.com https://*.analytics.google.com; font-src 'self'; frame-ancestors 'none'" always;

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # robots.txt, sitemap, and llms.txt — short cache
    location = /robots.txt {
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /sitemap.xml {
        expires 7d;
        add_header Cache-Control "public";
    }
    location = /llms.txt {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Dynamic secret routes — SPA fallback
    location /s/ {
        try_files $uri /index.html;
    }

    # Serve pre-rendered HTML if available, or 404
    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }
}
