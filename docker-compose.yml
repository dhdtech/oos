services:
  redis:
    image: redis:7-alpine
    networks:
      - oos

  api:
    build: ./api
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - oos

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.dev
    ports:
      - "8080:5173"
    volumes:
      - ./ui/src:/app/src
      - ./ui/public:/app/public
      - ./ui/index.html:/app/index.html
      - ./ui/vite.config.ts:/app/vite.config.ts
    depends_on:
      - api
    networks:
      - oos

networks:
  oos:
